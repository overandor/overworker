<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Overworker</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="animated-background"></div>
    
    <nav class="top-nav glass-container">
        <div class="nav-content">
            <div class="logo">
                <h1>⚡ OVERWORKER</h1>
            </div>
            <div class="nav-categories">
                <a href="/" class="nav-pill">Home</a>
                <a href="/features" class="nav-pill">Features</a>
                <a href="/pricing" class="nav-pill">Pricing</a>
                <a href="/about" class="nav-pill">About</a>
                <a href="/docs" class="nav-pill">Docs</a>
            </div>
        </div>
    </nav>
    
    <main class="main-content">
        <section class="hero">
            <h1 class="glitch-text">CONTACT US</h1>
            <p class="hero-subtitle">Get in touch with our team</p>
        </section>
        
        <section class="contact-section">
            <div class="glass-card contact-form">
                <form>
                    <input type="text" placeholder="Your Name" class="glass-input">
                    <input type="email" placeholder="Your Email" class="glass-input">
                    <textarea placeholder="Your Message" class="glass-input"></textarea>
                    <button type="submit" class="neon-button">Send Message</button>
                </form>
            </div>
        </section>
    </main>
    
    <nav class="bottom-nav glass-container">
        <div class="bottom-content">
            <a href="/contact" class="bottom-link active">Contact</a>
            <a href="/pricing" class="bottom-link">Pricing</a>
            <a href="/docs" class="bottom-link">Documentation</a>
            <div class="social-links">
                <a href="#" class="social-icon">𝕏</a>
                <a href="#" class="social-icon">in</a>
                <a href="#" class="social-icon">⭐</a>
            </div>
        </div>
    </nav>
    
    <link rel="stylesheet" href="/static/styles.css">
</body>
</html>
